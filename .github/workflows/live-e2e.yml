name: AeroOps Live E2E Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-verification:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: live-testing

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Install locked dependencies
        run: uv sync --locked --all-groups

      - name: Scan repository and validate workflows
        run: |
          uv run python scripts/validate_workflows.py
          uv run python scripts/secret_scanner.py

      - name: Create temporary live-test database
        run: uv run aeroops-init-db --reset --db-path "${{ runner.temp }}/aeroops.db"

      - name: Run optional live Gemini tests
        env:
          AEROOPS_DB_PATH: ${{ runner.temp }}/aeroops.db
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          AEROOPS_RUN_E2E_TESTS: "1"
          AEROOPS_OFFLINE_DEMO: "0"
        run: |
          uv run pytest tests/test_agent.py::TestEndToEnd -v
          uv run pytest tests/test_e2e_deterministic.py::TestLiveGeminiE2E -v
